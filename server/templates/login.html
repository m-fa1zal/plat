<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLAT — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: white;
      border-radius: 14px;
      padding: 40px 44px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand .logo {
      display: inline-block;
      background: #1a1a2e;
      color: white;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 4px;
      padding: 8px 20px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .brand .logo span { color: #e94560; }
    .brand p {
      font-size: 14px;
      color: #718096;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }
    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .form-group input {
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #e94560; }

    .error-box {
      background: #fff5f5;
      border: 1.5px solid #feb2b2;
      color: #c53030;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      text-align: center;
    }

    .btn-login {
      width: 100%;
      background: #e94560;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-login:hover { background: #c73652; }

    footer {
      margin-top: 28px;
      font-size: 12px;
      color: #a0aec0;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="brand">
      <div class="logo">PL<span>A</span>T</div>
      <p>Smart Parking System</p>
    </div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username"
               autocomplete="username" required autofocus />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password"
               autocomplete="current-password" required />
      </div>

      <button type="submit" class="btn-login">Login</button>
    </form>
  </div>

  <footer>PLAT Smart Parking System &mdash; Diploma Project</footer>

</body>
</html>
